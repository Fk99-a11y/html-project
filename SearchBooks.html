<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Books - Digital Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="Home.html">Digital Library 📖</a>
      <a href="SearchBooks.html">Books</a>
      <a href="BorrowedBooks.html">My Borrowed</a>
    </div>
    <div class="user-info">
      <img src="images/avtar1.jpg" id="userAvatar" style="display:none;" />
      <span id="usernameDisplay">Welcome Guest</span>
      <a href="#" id="logoutLink" style="display:none; color: #ffd369; margin-left: 10px;">Logout</a>
    </div>
  </div>

  <div class="container" style="width: 85%; margin: 30px auto;">
    <h2 style="color: white; text-align: center; text-shadow: 2px 2px 5px #000;">Search Our Collection</h2>
    
    <div class="search-section" style="background: rgba(255,255,255,0.9); padding: 20px; border-radius: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
      <div class="search-box">
        <label style="font-weight: bold; display: block;">Book Name</label>
        <input type="text" id="nameSearch" placeholder="Search by title..." style="width: 100%; padding: 10px; margin-top: 5px;">
      </div>
      <div class="search-box">
        <label style="font-weight: bold; display: block;">Author</label>
        <input type="text" id="authorSearch" placeholder="Search by author..." style="width: 100%; padding: 10px; margin-top: 5px;">
      </div>
      <div class="search-box">
        <label style="font-weight: bold; display: block;">Category</label>
        <select id="categorySearch" style="width: 100%; padding: 10px; margin-top: 5px;">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>
    <button id="searchBtn" style="width: 100%; margin-top: 15px; padding: 12px; background: #5d3a21; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Apply Filters</button>

    <table id="booksTable" style="width: 100%; margin-top: 25px; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden;">
      <thead>
        <tr style="background: #5d3a21; color: white;">
          <th style="padding: 15px;">Name</th>
          <th style="padding: 15px;">Author</th>
          <th style="padding: 15px;">Category</th>
          <th style="padding: 15px;">Status</th>
        </tr>
      </thead>
      <tbody id="booksTableBody">
        </tbody>
    </table>
  </div>

  <script src="js/search.js"></script>
</body>
</html>
