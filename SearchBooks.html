<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Search Books - Digital Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="Home.html">Digital Library 📖</a>
      <a href="SearchBooks.html">Books</a>
      <a href="BorrowedBooks.html">My Borrowed</a>
    </div>

    <div class="user-info">
      <img src="images/avtar1.jpg" id="userAvatar" style="display:none;" />
      <span id="usernameDisplay">Welcome Guest</span>
      <a href="#" id="logoutLink" style="display:none; color: #ffd369; margin-left: 10px;">Logout</a>
    </div>
  </div>

  <div class="container" style="width: 85%; margin: 30px auto;">
    <h2 style="color: rgb(188, 121, 6); text-align: center;">Search Our Collection</h2>

    <div class="search-section" style="background: rgba(255,255,255,0.9); padding: 20px; border-radius: 15px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">

      <div class="search-box">
        <label>Book ID</label>
        <input type="text" id="idSearch" placeholder="Search by ID..." />
      </div>

      <div class="search-box">
        <label>Book Name</label>
        <input type="text" id="nameSearch" placeholder="Search by title..." />
      </div>

      <div class="search-box">
        <label>Author</label>
        <input type="text" id="authorSearch" placeholder="Search by author..." />
      </div>

      <div class="search-box">
        <label>Category</label>
        <select id="categorySearch">
          <option value="">All Categories</option>
        </select>
      </div>
    </div>

    <button id="searchBtn">Apply Filters</button>

    <br>
    <br>

    <div id="descBox"></div>

    <table id="booksTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Author</th>
          <th>Category</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="booksTableBody"></tbody>
    </table>
  </div>

  <script src="js/search.js"></script>
</body>
</html>
