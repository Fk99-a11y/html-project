<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - Digital Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
  </head>

  <body>
    <div class="navbar">
      <div>
        <a href="Home.html">Digital Library 📖</a>
        <a href="Loginpage.html">Login</a>
        <a href="SignUp.html">Sign Up</a>
        <a href="SearchBooks.html">Books</a>
      </div>

      <div class="user-info">
        <img src="images/avtar1.jpg" id="userAvatar" />

        <span id="usernameDisplay">Welcome, Guest</span>

        <a href="#" id="logoutLink" style="display: none">Logout</a>
      </div>
    </div>

    <div class="signup-card">
      <h2>Create Account</h2>

      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            required
            placeholder="Enter username"
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            required
            placeholder="name@example.com"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            minlength="6"
            required
            placeholder="At least 6 characters"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            required
            placeholder="Confirm your password"
          />
        </div>

        <div class="form-group">
          <label for="avatar">Choose Avatar</label>

          <select id="avatar">
            <option value="images/avtar1.jpg">Avatar 1</option>

            <option value="images/avtar2.jpg">Avatar 2</option>

            <option value="images/avtar3.jpg">Avatar 3</option>

            <option value="images/avtar4.jpg">Avatar 4</option>
          </select>
        </div>

        <div class="form-group admin-group">
          <input type="checkbox" id="isAdmin" />
          <label for="isAdmin">Register as Admin</label>
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </div>

    <script>
      const usernameDisplay = document.getElementById("usernameDisplay");
      const userAvatar = document.getElementById("userAvatar");
      const logoutLink = document.getElementById("logoutLink");
      const form = document.getElementById("signupForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const avatar = document.getElementById("avatar").value;
        const isAdmin = document.getElementById("isAdmin").checked;
        if (password !== confirmPassword)
        {
          alert("Passwords do not match!");
          return;
        }
        let users = JSON.parse(localStorage.getItem("users")) || [];
        const exists = users.find((user) => user.email === email);
        if (exists)
        {
          alert("This email already exists!");
          return;
        }
        const newUser = {
          username: username,
          email: email,
          password: password,
          role: isAdmin ? "admin" : "user",
          avatar: avatar,
        };
        users.push(newUser);
        localStorage.setItem("users", JSON.stringify(users));
        alert("Account created successfully 🎉");
        localStorage.setItem("lastSignedUpUser", JSON.stringify(newUser));
        window.location.href = "Loginpage.html";
      });

      const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
      if (loggedInUser)
      {
        usernameDisplay.textContent = "Welcome, " + loggedInUser.username;
        userAvatar.style.display = "inline";
        if (loggedInUser.avatar)
        {
          userAvatar.src = loggedInUser.avatar;
        }
        logoutLink.style.display = "inline";
      }

      logoutLink.addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });
    </script>
  </body>
</html>
