<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - Digital Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <link rel="stylesheet" href="css/style.css"/>
  </head>

  <body>
    <div class="navbar">
      <div>
        <a href="Home.html">Digital Library 📖</a>
        <a href="Loginpage.html">Login</a>
        <a href="SignUp.html">Sign Up</a>
        <a href="SearchBooks.html">Books</a>
      </div>

      <div class="user-info">
        <img src="images/avtar1.jpg" id="userAvatar" />

        <span id="usernameDisplay">Welcome Guest</span>

        <a href="#" id="logoutLink" style="display: none">Logout</a>
      </div>
    </div>

    <div class="signup-card">
      <h2>Create Account</h2>

      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            required
            placeholder="Enter username"
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            required
            placeholder="name@example.com"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            minlength="6"
            required
            placeholder="At least 6 characters"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            required
            placeholder="Confirm your password"
          />
        </div>

        <div class="form-group">
          <label for="avatar">Choose Avatar</label>

          <select id="avatar">
            <option value="images/avtar1.jpg">Avatar 1</option>

            <option value="images/avtar2.jpg">Avatar 2</option>

            <option value="images/avtar3.jpg">Avatar 3</option>

            <option value="images/avtar4.jpg">Avatar 4</option>
          </select>
        </div>

        <div class="form-group admin-group">
          <input type="checkbox" id="isAdmin" />
          <label for="isAdmin">Register as Admin</label>
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </div>
    <script src="js/SignUp.js"></script>
  </body>
</html>
