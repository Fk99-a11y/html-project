<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Digital Library</title>

    {% load static %}

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <div class="navbar">
      <div class="nav-left">
        <a href="{% url 'home' %}">Digital Library 📖</a>
        <a href="{% url 'search_books' %}">Books</a>
        <a href="{% url 'signup' %}">Sign Up</a>
      </div>

      <div class="user-info">
        <img src="{% static 'images/avtar1.jpg' %}" />
        <span id="usernameDisplay">Welcome, Guest</span>
        <a href="{% url 'logout' %}" id="logoutLink" style="display: none">
          Logout
        </a>
      </div>
    </div>

    <div class="login-card">
      <h2>Login</h2>

      {% if error %}
      <div id="error-msg" style="display: block">{{ error }}</div>
      {% else %}
      <div id="error-msg"></div>
      {% endif %}

      <form method="POST" id="loginForm">
        {% csrf_token %}

        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit">Login</button>

        <a href="{% url 'signup' %}" class="signup-link">
          Don't have an account? Sign Up
        </a>
      </form>
    </div>

    <!-- JS -->
    <script src="{% static 'js/login.js' %}"></script>
  </body>
</html>
