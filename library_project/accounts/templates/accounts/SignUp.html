<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up - Digital Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>

  <body>
    <div class="navbar">
      <div>
        <a href="{% url 'home' %}">Digital Library 📖</a>
        <a href="{% url 'login' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
        <a href="{% url 'search_books' %}">Books</a>
      </div>

      <div class="user-info">
        <img src="{% static 'images/avtar1.jpg' %}" id="userAvatar" />

        <span id="usernameDisplay">Welcome Guest</span>

        <a href="{% url 'logout' %}" id="logoutLink" style="display: none">
          Logout
        </a>
      </div>
    </div>

    <div class="signup-card">
      <h2>Create Account</h2>

      {% if error %}
      <div style="color: red; text-align: center; margin-bottom: 10px">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            name="username"
            required
            placeholder="Enter username"
          />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            name="email"
            required
            placeholder="name@example.com"
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            minlength="6"
            required
            placeholder="At least 6 characters"
          />
        </div>

        <button type="submit">Sign Up</button>
      </form>
    </div>

    <script src="{% static 'js/SignUp.js' %}"></script>
  </body>
</html>
