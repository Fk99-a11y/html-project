<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Digital Library</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      .login-card {
        width: 350px;
        background: white;
        padding: 30px;
        margin: 100px auto;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        text-align: center;
      }

      .login-card h2 {
        margin-bottom: 20px;
        color: #5d3a21;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        font-weight: bold;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      .login-btn {
        width: 100%;
        padding: 10px;
        background: #5d3a21;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      }

      .login-btn:hover {
        background: #7a4a2a;
      }

      .signup-link {
        margin-top: 15px;
        display: block;
        color: #5d3a21;
        text-decoration: none;
      }

      .signup-link:hover {
        text-decoration: underline;
      }

      #error-msg {
        color: red;
        margin-bottom: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <a href="Home.html">Digital Library 📖</a>
      <a href="Loginpage.html">Login</a>
      <a href="SignUp.html">Sign Up</a>
      <a href="SearchBooks.html">Books</a>

      <form action="SearchBooks.html" method="get" style="display: inline">
        <input
          type="text"
          name="search"
          placeholder="Search..."
          class="search"
        />
        <button type="submit" class="search-btn">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
    </div>

    <div class="login-card">
      <h2>Login</h2>

      <div id="error-msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="login-btn">Login</button>
        <a href="SignUp.html" class="signup-link"
          >Don't have an account? Sign Up</a
        >
      </form>
    </div>

    <script>
      const accounts = [
        { email: "admin@library.com", password: "admin123", role: "admin" },
        { email: "user@library.com", password: "user123", role: "user" },
      ];

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const errorMsg = document.getElementById("error-msg");

          const user = accounts.find(
            (acc) => acc.email === email && acc.password === password,
          );

          if (user) {
            errorMsg.style.display = "none";

            if (user.role === "admin") {
              alert("Welcome Admin! 🎉");
              window.location.href = "AdminView.html"; 
            } else {
              alert("Welcome User! 📚");
              window.location.href = "UserView.html";
            }
          } else {
            errorMsg.style.display = "block";
            errorMsg.textContent = "Login Failed: Invalid email or password!";
          }
        });
    </script>
  </body>
</html>
