<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Dashboard - Digital Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-image: url("images/Library.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
      }

      .navbar {
        background: rgba(93, 58, 33, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        color: white;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
      }

      .navbar a:hover {
        text-decoration: underline;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-info img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: 2px solid #f1c40f;
        display: none;
      }

      .container {
        max-width: 900px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 15px;
      }

      h2 {
        text-align: center;
        color: #5d3a21;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      th {
        background: #5d3a21;
        color: white;
      }

      .book-link {
        color: #5d3a21;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
      }

      .book-link:hover {
        color: #e67e22;
      }

      .available {
        color: green;
        font-weight: bold;
      }

      .not-available {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div>
        <a href="Home.html">Digital Library 📖</a>
        <a href="SearchBooks.html">Books</a>
        <a href="Loginpage.html" id="loginLink">Login</a>
        <a href="SignUp.html" id="signupLink">Sign Up</a>
        <a href="#" id="logoutLink" style="display:none;">Logout</a>
      </div>

      <div class="user-info">
        <img id="userAvatar" src="images/default-avtar1.jpg" />
        <span id="usernameDisplay">Welcome Guest</span>
      </div>
    </div>

    <div class="container">
      <h2>User Dashboard - Available Books</h2>

      <table>
        <thead>
          <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody id="booksBody"></tbody>
      </table>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("loggedInUser"));

      const loginLink = document.getElementById("loginLink");
      const signupLink = document.getElementById("signupLink");
      const logoutLink = document.getElementById("logoutLink");
      const usernameDisplay = document.getElementById("usernameDisplay");
      const userAvatar = document.getElementById("userAvatar");

      if (!user) {
        alert("Please login first!");
        window.location.href = "Loginpage.html";
      } else {
        if (user.role !== "user") {
          alert("Admins should use Admin Dashboard!");
          window.location.href = "AdminDashboard.html";
        }

        usernameDisplay.textContent = "Welcome, " + user.username;

        loginLink.style.display = "none";
        signupLink.style.display = "none";
        logoutLink.style.display = "inline";

        if (user.avatar) {
          userAvatar.src = user.avatar;
        }
        userAvatar.style.display = "inline";
      }

      logoutLink.addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });

      const books = JSON.parse(localStorage.getItem("books")) || [];
      const tbody = document.getElementById("booksBody");

      function renderBooks() {
        tbody.innerHTML = "";

        books.forEach((book, index) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>
              <span class="book-link" onclick="showDesc(${index})">
                ${book.name}
              </span>
            </td>
            <td>${book.author}</td>
            <td class="${book.available ? "available" : "not-available"}">
              ${book.available ? "Available" : "Not Available"}
            </td>
          `;

          tbody.appendChild(tr);
        });
      }

      window.showDesc = function (index) {
        alert(
          "Description:\n" +
            (books[index].description || "No description available")
        );
      };

      renderBooks();
    </script>
  </body>
</html>
