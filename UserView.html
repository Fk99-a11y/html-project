<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard - Digital Library</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-image: url("images/Library.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        color: #fff;
        min-height: 100vh;
      }

      /* Navbar */
      .navbar {
        background: rgba(93, 58, 33, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
      }

      .navbar a:hover {
        text-decoration: underline;
      }

      .navbar .username {
        font-weight: bold;
        color: #f1c40f;
      }

      .navbar form {
        display: flex;
      }

      .navbar input[type="text"] {
        padding: 5px 10px;
        border-radius: 5px 0 0 5px;
        border: none;
        outline: none;
      }

      .navbar button {
        padding: 5px 10px;
        border-radius: 0 5px 5px 0;
        border: none;
        background: #7a4a2a;
        color: white;
        cursor: pointer;
      }

      /* Container */
      .container {
        max-width: 900px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.9);
        color: #333;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      }

      h2 {
        color: #5d3a21;
        text-align: center;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }

      th, td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      th {
        background: #5d3a21;
        color: white;
      }

      /* تنسيق رابط اسم الكتاب */
      .book-link {
        text-decoration: none;
        color: #5d3a21;
        font-weight: bold;
        transition: 0.3s;
        border-bottom: 1px dashed transparent;
      }

      .book-link:hover {
        color: #e67e22;
        border-bottom: 1px dashed #e67e22;
      }

      td.available {
        color: green;
        font-weight: bold;
      }

      td.not-available {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-left">
        <a href="Home.html">Digital Library 📖</a>
        <a href="SearchBooks.html">Books</a>
        <a href="Loginpage.html" id="loginLink">Login</a>
        <a href="SignUp.html" id="signupLink">Sign Up</a>
        <a href="#" id="logoutLink" style="display: none">Logout</a>
      </div>
      <div class="username" id="usernameDisplay">Welcome, Guest</div>

      <form action="SearchBooks.html" method="get">
        <input type="text" name="search" placeholder="Search..." />
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
    </div>

    <div class="container">
      <h2>User Dashboard - Available Books</h2>

      <table>
        <thead>
          <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><a href="search.html" class="book-link">Software Engineering</a></td>
            <td>D. Ali</td>
            <td class="available">Available</td>
          </tr>
          <tr>
            <td><a href="search.html" class="book-link">Web Technology</a></td>
            <td>Sarah Mahmoud</td>
            <td class="not-available">Not Available</td>
          </tr>
          <tr>
            <td><a href="search.html" class="book-link">Learn C++</a></td>
            <td>Ahmed Ali</td>
            <td class="available">Available</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      const loginLink = document.getElementById("loginLink");
      const signupLink = document.getElementById("signupLink");
      const logoutLink = document.getElementById("logoutLink");
      const usernameDisplay = document.getElementById("usernameDisplay");

      if (!user) {
        alert("Please login first!");
        window.location.href = "Loginpage.html";
      } else {
        usernameDisplay.textContent = "Welcome, " + user.username;
        loginLink.style.display = "none";
        signupLink.style.display = "none";
        logoutLink.style.display = "inline";

        // التأكد من أن هذا ليس الأدمن
        if (user.role === "admin") {
          alert("Admins should use Admin Dashboard!");
          window.location.href = "ViewBook.html";
        }
      }

      logoutLink.addEventListener("click", function () {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });
    </script>
  </body>
</html>
