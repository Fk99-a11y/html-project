<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Digital Library</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-image: url("images/Library.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: #fff;
        min-height: 100vh;
      }

      /* Navbar */
      .navbar {
        background: rgba(93, 58, 33, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        flex-wrap: wrap;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
      }

      .navbar a:hover {
        text-decoration: underline;
      }

      .navbar .username {
        font-weight: bold;
      }

      .navbar form {
        display: flex;
        margin-top: 10px;
      }

      .navbar input[type="text"] {
        padding: 5px 10px;
        border-radius: 5px 0 0 5px;
        border: none;
        outline: none;
      }

      .navbar button {
        padding: 5px 10px;
        border-radius: 0 5px 5px 0;
        border: none;
        background: #7a4a2a;
        color: white;
        cursor: pointer;
      }

      .navbar button:hover {
        background: #5d3a21;
      }

      /* Container */
      .container {
        max-width: 1000px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.85);
        color: #333;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
      }

      h2 {
        color: #5d3a21;
        text-align: center;
        margin-bottom: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
        color: #333;
      }

      th {
        background: #5d3a21;
        color: white;
      }

      .btn-edit {
        background-color: #74e795;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        margin-right: 5px;
        border-radius: 5px;
      }

      .btn-delete {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 5px;
      }

      .btn-edit:hover {
        background-color: #5ac36e;
      }

      .btn-delete:hover {
        background-color: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-left">
        <a href="Home.html">Digital Library 📖</a>
        <a href="SearchBooks.html">Books</a>
        <a href="Loginpage.html" id="loginLink">Login</a>
        <a href="SignUp.html" id="signupLink">Sign Up</a>
        <a href="#" id="logoutLink" style="display: none">Logout</a>
      </div>
      <div class="username" id="usernameDisplay">Welcome, Guest</div>

      <form action="SearchBooks.html" method="get">
        <input
          type="text"
          name="search"
          placeholder="Search..."
          class="search"
        />
        <button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
    </div>

    <!-- Main Container -->
    <div class="container">
      <h2>Admin Dashboard - Manage Books</h2>

      <table>
        <thead>
          <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th>Category</th>
            <th>Control</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Learn C++</td>
            <td>Ahmead Ali</td>
            <td>Programming</td>
            <td>
              <button
                class="btn-edit"
                onclick="location.href = 'edit_book.html'"
              >
                Edit
              </button>
              <button class="btn-delete">Delete</button>
            </td>
          </tr>
          <tr>
            <td>Software Engineering</td>
            <td>D. Ali</td>
            <td>Programming</td>
            <td>
              <button
                class="btn-edit"
                onclick="location.href = 'edit_book.html'"
              >
                Edit
              </button>
              <button class="btn-delete">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      const loginLink = document.getElementById("loginLink");
      const signupLink = document.getElementById("signupLink");
      const logoutLink = document.getElementById("logoutLink");
      const usernameDisplay = document.getElementById("usernameDisplay");

      if (!user) {
        alert("Please login first!");
        window.location.href = "Loginpage.html";
      } else {
        usernameDisplay.textContent = "Welcome, " + user.username;
        loginLink.style.display = "none";
        signupLink.style.display = "none";
        logoutLink.style.display = "inline";

        if (user.role !== "admin") {
          alert("Access denied! Only admins can enter.");
          window.location.href = "Home.html";
        }
      }

      logoutLink.addEventListener("click", function () {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });
    </script>
  </body>
</html>
