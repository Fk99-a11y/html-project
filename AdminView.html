<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Digital Library</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-image: url("images/Library.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
      }

      .navbar {
        background: rgba(93, 58, 33, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        color: white;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
      }

      .navbar a:hover {
        text-decoration: underline;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-info img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: 2px solid #f1c40f;
      }

      .container {
        max-width: 1000px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.92);
        padding: 30px;
        border-radius: 15px;
      }

      h2 {
        text-align: center;
        color: #5d3a21;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        border: 1px solid #ddd;
        padding: 12px;
        text-align: center;
      }

      th {
        background: #5d3a21;
        color: white;
      }

      .book-link {
        color: #5d3a21;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
      }

      .book-link:hover {
        color: #e67e22;
      }

      .btn-edit {
        background: #74e795;
        border: none;
        padding: 6px 12px;
        margin-right: 5px;
        border-radius: 5px;
        cursor: pointer;
      }

      .btn-delete {
        background: #dc3545;
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div>
        <a href="Home.html">Digital Library 📖</a>
        <a href="SearchBooks.html">Books</a>
      </div>

      <div class="user-info">
        <img id="userAvatar" src="images/avtar1.jpg" />
        <span id="usernameDisplay">Welcome Guest</span>
        <a href="#" id="logoutLink" style="display:none;">Logout</a>
      </div>
    </div>

    <div class="container">
      <h2>Admin Dashboard - Manage Books</h2>

      <table>
        <thead>
          <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th>Category</th>
            <th>Control</th>
          </tr>
        </thead>
        <tbody id="booksTableBody"></tbody>
      </table>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      const booksTableBody = document.getElementById("booksTableBody");

      const usernameDisplay = document.getElementById("usernameDisplay");
      const userAvatar = document.getElementById("userAvatar");
      const logoutLink = document.getElementById("logoutLink");

      if (!user) {
        alert("Please login first!");
        window.location.href = "Loginpage.html";
      } else if (user.role !== "admin") {
        alert("Access denied (Admin only)");
        window.location.href = "Home.html";
      } else {
        usernameDisplay.textContent = "Admin: " + user.username;

        if (user.avatar) {
          userAvatar.src = user.avatar;
        }

        logoutLink.style.display = "inline";
      }

      logoutLink.addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });

      let books = JSON.parse(localStorage.getItem("books")) || [];

      function renderBooks() {
        booksTableBody.innerHTML = "";

        books.forEach((book, index) => {
          const tr = document.createElement("tr");

          tr.innerHTML = `
            <td>
              <span class="book-link" onclick="showDesc(${index})">
                ${book.name}
              </span>
            </td>
            <td>${book.author}</td>
            <td>${book.category}</td>
            <td>
              <button class="btn-edit" onclick="editBook(${index})">Edit</button>
              <button class="btn-delete" onclick="deleteBook(${index})">Delete</button>
            </td>
          `;

          booksTableBody.appendChild(tr);
        });
      }

      window.showDesc = function (index) {
        alert(
          "Description:\n" +
            (books[index].description || "No description available")
        );
      };

      window.deleteBook = function (index) {
        books.splice(index, 1);
        localStorage.setItem("books", JSON.stringify(books));
        renderBooks();
      };

      window.editBook = function (index) {
        const newName = prompt("Edit Book Name:", books[index].name);
        if (newName) {
          books[index].name = newName;
          localStorage.setItem("books", JSON.stringify(books));
          renderBooks();
        }
      };

      renderBooks();
    </script>
  </body>
</html>
