<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>عرض الكتب</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #5D3A21;
        }

        .btn-edit {
            background-color: #74E795;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>لوحة التحكم (Admin View)</h2>
    <table>
        <thead>
            <tr>
                <th>اسم الكتاب</th>
                <th>المؤلف</th>
                <th>التحكم</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>تعلم C++</td>
                <td>أحمد علي</td>
                <td>
                    <button class="btn-edit" onclick="location.href='edit_book.html'">تعديل Edit</button>
                    <button class="btn-delete">حذف Delete</button>
                </td>
            </tr>
        </tbody>
    </table>

    <hr>

    <h2>عرض المستخدم (User View)</h2>
    <table>
        <thead>
            <tr>
                <th>اسم الكتاب</th>
                <th>المؤلف</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>هندسة البرمجيات</td>
                <td>د. محمد</td>
                <td style="color: green;">متاح Available</td>
            </tr>
            <tr>
                <td>تكنولوجيا الويب</td>
                <td>سارة محمود</td>
                <td style="color: red;">غير متاح Not Available</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
