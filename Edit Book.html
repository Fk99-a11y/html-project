<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Book - Digital Library</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-image: url("images/Library.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        min-height: 100vh;
        color: #333;
      }

      .navbar {
        background: rgba(93, 58, 33, 0.85);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 20px;
        flex-wrap: wrap;
        color: #fff;
      }

      .navbar a {
        color: white;
        text-decoration: none;
        margin-left: 15px;
        font-weight: bold;
      }

      .navbar a:hover {
        text-decoration: underline;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-info img {
        width: 35px;
        height: 35px;
        border-radius: 50%;
        border: 2px solid #f1c40f;
      }

      .main-content {
        max-width: 600px;
        margin: 60px auto;
        padding: 20px;
      }

      .info-card {
        background: rgba(255, 255, 255, 0.95);
        color: #333;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        border-top: 8px solid #5d3a21;
      }

      .info-card h2 {
        color: #5d3a21;
        text-align: center;
        font-size: 32px;
        margin-top: 0;
        margin-bottom: 25px;
      }

      label {
        display: block;
        font-weight: bold;
        color: #7a4a2a;
        margin-bottom: 8px;
      }

      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 16px;
      }

      .btn-save {
        background: #5d3a21;
        color: white;
        padding: 12px 30px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
      }

      .btn-save:hover {
        background: #28a745;
        transform: translateY(-2px);
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #5d3a21;
        text-decoration: none;
        font-weight: bold;
      }

      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-left">
        <a href="Home.html">Digital Library 📖</a>
        <a href="SearchBooks.html">Books</a>
      </div>
      <div class="user-info">
        <img
          src="images/default-avtar1.jpg"
          id="userAvatar"
          alt="User Avatar"
        />
        <span id="usernameDisplay">Admin Panel</span>
        <a href="#" id="logoutLink" style="display: none">Logout</a>
      </div>
    </div>

    <div class="main-content">
      <div class="info-card">
        <h2>Edit Book Data</h2>
        <form>
          <label><i class="fa-solid fa-book"></i> Book Title:</label>
          <input type="text" value="Learn C++" required />

          <label><i class="fa-solid fa-user-pen"></i> Author:</label>
          <input type="text" value="Ahmed Ali" required />

          <label><i class="fa-solid fa-hashtag"></i> Number of Pages:</label>
          <input type="number" value="450" required />

          <label><i class="fa-solid fa-list"></i> Category:</label>
          <select>
            <option selected>Programming</option>
            <option>Sciences</option>
            <option>Novels</option>
          </select>

          <label><i class="fa-solid fa-align-left"></i> About the Book:</label>
          <textarea rows="4">
This book covers C++ basics and advanced OOP concepts.</textarea
          >

          <button type="submit" class="btn-save">Save Changes</button>
        </form>
        <a href="AdminDashboard.html" class="back-link">← Back to Dashboard</a>
      </div>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      const usernameDisplay = document.getElementById("usernameDisplay");
      const userAvatar = document.getElementById("userAvatar");
      const logoutLink = document.getElementById("logoutLink");

      if (!user || user.role !== "admin") {
        alert("Access Denied! Admins only.");
        window.location.href = "Loginpage.html";
      } else {
        usernameDisplay.textContent = "Admin: " + user.username;
        if (user.avatar) userAvatar.src = user.avatar;
        logoutLink.style.display = "inline";
      }

      logoutLink.addEventListener("click", () => {
        localStorage.removeItem("loggedInUser");
        window.location.href = "Loginpage.html";
      });
    </script>
  </body>
</html>
